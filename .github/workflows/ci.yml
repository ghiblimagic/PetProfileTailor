name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXTAUTH_URL: http://localhost:3000
  NEXTAUTH_SECRET: ci-nextauth-secret-not-for-production
  MONGODB_URI: mongodb://127.0.0.1:27017/homeward_tails_ci_build?replicaSet=rs0
  MONGODB_URI_TEST: mongodb://127.0.0.1:27017/homeward_tails_e2e?replicaSet=rs0
  PLAYWRIGHT_TEST_EMAIL: e2e-ci@example.com
  PLAYWRIGHT_TEST_PASSWORD: e2eci-pass-2026
  PLAYWRIGHT_TEST_PROFILENAME: e2eciuser
  PLAYWRIGHT_TEST_NAME: E2E CI User
  # Resend is constructed at import time in lib/auth → build fails without a key
  RESEND_API_KEY: re_ci_placeholder_not_used
  RESEND_EMAIL_FROM: ci@example.com

jobs:
  fast:
    name: fast
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --replSet rs0
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Init MongoDB replica set
        run: |
          for i in $(seq 1 30); do
            if docker run --rm --network host mongo:7 mongosh "mongodb://127.0.0.1:27017" --quiet --eval "db.adminCommand({ ping: 1 })"; then
              break
            fi
            sleep 2
          done
          docker run --rm --network host mongo:7 mongosh "mongodb://127.0.0.1:27017" --eval '
            try { rs.status(); } catch (e) {
              rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "127.0.0.1:27017" }] });
            }
          '
          for i in $(seq 1 30); do
            if docker run --rm --network host mongo:7 mongosh "mongodb://127.0.0.1:27017/?replicaSet=rs0" --quiet --eval "rs.isMaster().ismaster" | grep -q true; then
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB replica set did not become primary in time"
          exit 1

      - name: E2E tests
        run: pnpm test:e2e:ci
        env:
          CI: "true"

      - name: Upload Playwright trace on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
